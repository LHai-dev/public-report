name: Deploy to production

env:
  CONTEXT_DIR: "./"
  IMAGE_NAME: ${{ github.repository }}/prod
  DOCKERFILE: Dockerfile
  CAPROVER_APP: public-report
  DOCKER_REGISTRY: ghcr.io
  SKIP_ENV_VALIDATION: "true"
  NEXT_PUBLIC_API_URL: https://public-report.cap27.online
  NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
on:
  push:
    branches:
      - main

jobs:
  build-and-publish-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          IMAGE_NAME_LOWER=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME_WITH_REGISTRY=$DOCKER_REGISTRY/$IMAGE_NAME_LOWER" >> $GITHUB_ENV
          export IMAGE_NAME_WITH_REGISTRY=$DOCKER_REGISTRY/$IMAGE_NAME_LOWER
          echo "FULL_IMAGE_NAME=$IMAGE_NAME_WITH_REGISTRY:$GITHUB_SHA-gitsha" >> $GITHUB_ENV
          echo "CAPROVER_GIT_COMMIT_SHA=$GITHUB_SHA" >> $GITHUB_ENV
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Prepare script
        run: |
          sed -i 's/\r$//' ./scripts/build-and-push-github-caprover.sh
          chmod +x ./scripts/build-and-push-github-caprover.sh
      - name: Build and Push Release to DockerHub
        shell: bash
        run: bash ./scripts/build-and-push-github-caprover.sh
      - name: Deploy to CapRover
        run: |
          npm install -g caprover
          caprover deploy --caproverUrl ${{ secrets.CAPROVER_SERVER }} --appToken ${{ secrets.CAPROVER_APP_TOKEN }} --imageName ${{ env.FULL_IMAGE_NAME }} --appName ${{ env.CAPROVER_APP }}
